<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1540 510" width="1540" height="510" style="background:#fff;font-family:Arial,sans-serif">
  <!-- Title -->
  <text x="30" y="30" font-size="16" font-weight="bold" fill="#111">Document Preprocesssing &amp; Embedding Creation</text>

  <!-- Outer dashed box (full pipeline) -->
  <rect x="20" y="45" width="1100" height="440" fill="none" stroke="#5bc0de" stroke-width="1.5" stroke-dasharray="6,3" rx="4"/>

  <!-- Top dashed box (doc ingestion section) -->
  <rect x="20" y="45" width="720" height="195" fill="none" stroke="#5bc0de" stroke-width="1.5" stroke-dasharray="6,3" rx="4"/>

  <!-- PDF icon -->
  <rect x="55" y="75" width="50" height="60" rx="4" fill="#e03131"/>
  <text x="80" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PDF</text>
  <text x="80" y="155" text-anchor="middle" font-size="10" fill="#333">Collection of Documents</text>
  <text x="80" y="168" text-anchor="middle" font-size="10" fill="#333">Example: Large</text>
  <text x="80" y="181" text-anchor="middle" font-size="10" fill="#333">Database of PDFs</text>

  <!-- Arrow 1 -->
  <line x1="108" y1="105" x2="150" y2="105" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PY script icon -->
  <rect x="152" y="75" width="50" height="60" rx="4" fill="#4a6cf7"/>
  <text x="177" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PY</text>
  <text x="200" y="155" text-anchor="middle" font-size="10" fill="#333">Preprocess text into smaller</text>
  <text x="200" y="168" text-anchor="middle" font-size="10" fill="#333">chunks</text>
  <text x="200" y="181" text-anchor="middle" font-size="10" fill="#333">Example: Group of 10 sentence</text>

  <!-- Arrow 2 -->
  <line x1="205" y1="105" x2="248" y2="105" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Doc chunks icon -->
  <rect x="250" y="75" width="50" height="60" rx="4" fill="#868e96"/>
  <text x="275" y="112" text-anchor="middle" font-size="18" fill="white">&#9783;</text>
  <text x="320" y="155" text-anchor="middle" font-size="10" fill="#333">Smaller document chunks</text>
  <text x="320" y="168" text-anchor="middle" font-size="10" fill="#333">used as context for LLM</text>

  <!-- Arrow 3 down to embedding model -->
  <line x1="560" y1="105" x2="560" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow from chunks to embedding -->
  <line x1="308" y1="105" x2="520" y2="105" stroke="#555" stroke-width="1.5"/>
  <line x1="520" y1="105" x2="520" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Torch tensor icon (top right of inner box) -->
  <circle cx="870" cy="100" r="28" fill="none" stroke="#e03131" stroke-width="3"/>
  <circle cx="870" cy="85" r="5" fill="#e03131"/>
  <text x="870" y="145" text-anchor="middle" font-size="10" fill="#333">Store embeddings in torch tensor</text>
  <text x="870" y="158" text-anchor="middle" font-size="10" fill="#333">(Fast for even 100k+ embeddings)</text>

  <!-- All happens on CPU/GPU label -->
  <text x="1180" y="100" text-anchor="middle" font-size="13" fill="#333">All happens on a local CPU/GPU</text>

  <!-- Embedding model (central node - colorful) -->
  <circle cx="560" cy="290" r="35" fill="#4dabf7"/>
  <circle cx="520" cy="260" r="15" fill="#ffd43b"/>
  <circle cx="598" cy="260" r="15" fill="#51cf66"/>
  <circle cx="520" cy="320" r="15" fill="#ff6b6b"/>
  <circle cx="598" cy="320" r="15" fill="#74c0fc"/>
  <text x="560" y="355" text-anchor="middle" font-size="10" fill="#333">Embedding Model turns the text/query into the</text>
  <text x="560" y="368" text-anchor="middle" font-size="10" fill="#333">numerical representation</text>
  <text x="560" y="381" text-anchor="middle" font-size="10" fill="#333">Example: Sentence Transformers</text>

  <!-- Arrow from embedding model to vector DB -->
  <line x1="596" y1="290" x2="760" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow from embedding to torch tensor -->
  <line x1="560" y1="255" x2="840" y2="130" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Vector DB icon -->
  <ellipse cx="820" cy="270" rx="45" ry="18" fill="#4a6cf7"/>
  <rect x="775" y="270" width="90" height="40" fill="#4a6cf7"/>
  <ellipse cx="820" cy="310" rx="45" ry="18" fill="#3a5ce0"/>
  <text x="820" y="348" text-anchor="middle" font-size="10" fill="#333">Optional: Use the vector database/index if</text>
  <text x="820" y="361" text-anchor="middle" font-size="10" fill="#333">your database is really large</text>

  <!-- Arrow from vector DB to right -->
  <line x1="865" y1="290" x2="1050" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Person icon -->
  <circle cx="75" cy="285" r="20" fill="#ffc107"/>
  <text x="75" y="291" text-anchor="middle" font-size="16">&#128100;</text>
  <text x="75" y="325" text-anchor="middle" font-size="10" fill="#333">Cool Person</text>
  <text x="75" y="338" text-anchor="middle" font-size="10" fill="#333">(Maybe You)</text>

  <!-- Arrow person to question mark -->
  <line x1="96" y1="285" x2="155" y2="285" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Question mark circle -->
  <circle cx="185" cy="285" r="28" fill="white" stroke="#111" stroke-width="2.5"/>
  <text x="185" y="292" text-anchor="middle" font-size="22" font-weight="bold" fill="#111">?</text>
  <text x="185" y="330" text-anchor="middle" font-size="10" fill="#333">Ask a query</text>

  <!-- Red query text -->
  <text x="310" y="274" text-anchor="middle" font-size="11" font-weight="bold" fill="#e03131">Explain the different methods</text>
  <text x="310" y="288" text-anchor="middle" font-size="11" font-weight="bold" fill="#e03131">used in this paper?</text>

  <!-- Arrow from query to embedding model -->
  <line x1="215" y1="285" x2="520" y2="285" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow from vector DB down and back to person (feedback loop) -->
  <line x1="820" y1="330" x2="820" y2="450" stroke="#555" stroke-width="1"/>
  <line x1="820" y1="450" x2="75" y2="450" stroke="#555" stroke-width="1"/>
  <line x1="75" y1="450" x2="75" y2="360" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Chat web interface -->
  <rect x="130" y="430" width="55" height="45" rx="4" fill="white" stroke="#4a6cf7" stroke-width="2"/>
  <text x="157" y="460" text-anchor="middle" font-size="18">&#127760;</text>
  <text x="157" y="492" text-anchor="middle" font-size="10" fill="#333">Optional: Chat web Interface</text>

  <!-- Right side: Query + Relevant Passages doc icon -->
  <rect x="1055" y="370" width="40" height="50" rx="3" fill="white" stroke="#555" stroke-width="1.5"/>
  <line x1="1062" y1="382" x2="1088" y2="382" stroke="#999" stroke-width="1"/>
  <line x1="1062" y1="390" x2="1088" y2="390" stroke="#999" stroke-width="1"/>
  <line x1="1062" y1="398" x2="1088" y2="398" stroke="#999" stroke-width="1"/>
  <text x="1075" y="438" text-anchor="middle" font-size="10" fill="#333">Query + Relevant Passages</text>

  <!-- Arrow from doc to LLM -->
  <line x1="1096" y1="395" x2="1145" y2="395" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Red query text right side -->
  <text x="1210" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#e03131">Explain the different methods</text>
  <text x="1210" y="304" text-anchor="middle" font-size="11" font-weight="bold" fill="#e03131">used in this paper?</text>

  <!-- LLM colorful node -->
  <circle cx="1400" cy="310" r="38" fill="#ff6b35"/>
  <circle cx="1360" cy="275" r="14" fill="#51cf66"/>
  <circle cx="1440" cy="275" r="14" fill="#ffd43b"/>
  <circle cx="1360" cy="345" r="14" fill="#74c0fc"/>
  <circle cx="1440" cy="345" r="14" fill="#868e96"/>
  <text x="1400" y="365" text-anchor="middle" font-size="10" fill="#333">LLM generates output based on the</text>
  <text x="1400" y="378" text-anchor="middle" font-size="10" fill="#333">context related to query</text>

  <!-- Arrow from vector DB area to right doc and LLM (going right outside main box) -->
  <line x1="1120" y1="290" x2="1075" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1120" y1="290" x2="1350" y2="310" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow markers definition -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>
